
  
  
    
<nav-container class='navContainer0'
      [content] = '[gemColumn1Tpl, ]'
>
</nav-container>



  <ng-template #gemText2Tpl>
    
    
<gem-text class='gemText2'
      [value] = 'getGemText2ValueForAngular__ChangeDetection(
        )'
      [size] = 'getGemText2SizeForAngular__ChangeDetection(
        )'
      [weight] = 'getGemText2WeightForAngular__ChangeDetection(
        )'
>
</gem-text>



  </ng-template>
  <ng-template #it3Tpl>
    
  
  <ng-container *ngFor='let c of getIt3IterableForAngular__ChangeDetection(); index as cIt3'>
  
  
    
<gem-card class='carInfo'
      [title] = 'getCarInfoTitleForAngular__ChangeDetection(
        c)'
      [component] = 'gemRow4Tpl'
>
</gem-card>



  <ng-template #gemImage5Tpl>
    
    
<gem-image class='gemImage5'
      [width] = 'getGemImage5WidthForAngular__ChangeDetection(
        c)'
      [source] = 'getGemImage5SourceForAngular__ChangeDetection(
        c)'
>
</gem-image>



  </ng-template>
  <ng-template #gemText7Tpl>
    
    
<gem-text class='gemText7'
      [value] = 'getGemText7ValueForAngular__ChangeDetection(
        c)'
>
</gem-text>



  </ng-template>
  <ng-template #gemText8Tpl>
    
    
<gem-text class='gemText8'
      [value] = 'getGemText8ValueForAngular__ChangeDetection(
        c)'
      [color] = 'getGemText8ColorForAngular__ChangeDetection(
        c)'
>
</gem-text>



  </ng-template>
  <ng-template #gemText9Tpl>
    
    
<gem-text class='gemText9'
      [value] = 'getGemText9ValueForAngular__ChangeDetection(
        c)'
>
</gem-text>



  </ng-template>
  <ng-template #gemText10Tpl>
    
    
<gem-text class='gemText10'
      [value] = 'getGemText10ValueForAngular__ChangeDetection(
        c)'
>
</gem-text>



  </ng-template>
  <ng-template #gemGrid6Tpl>
    
    
<gem-grid class='gemGrid6'
      [width] = 'getGemGrid6WidthForAngular__ChangeDetection(
        c)'
      [colGap] = 'getGemGrid6ColGapForAngular__ChangeDetection(
        c)'
      [rowGap] = 'getGemGrid6RowGapForAngular__ChangeDetection(
        c)'
      [rows] = '[[gemText7Tpl, gemText8Tpl, ], [gemText9Tpl, gemText10Tpl, ], ]'
>
</gem-grid>



  </ng-template>
  <ng-template #gemText12Tpl>
    
    
<gem-text class='gemText12'
      [value] = 'getGemText12ValueForAngular__ChangeDetection(
        c)'
      [size] = 'getGemText12SizeForAngular__ChangeDetection(
        c)'
>
</gem-text>



  </ng-template>
  <ng-template #gemButton13Tpl>
    
    
<gem-button class='gemButton13'
      [width] = 'getGemButton13WidthForAngular__ChangeDetection(
        c)'
      [label] = 'getGemButton13LabelForAngular__ChangeDetection(
        c)'
      (leftClick) = 'gemButton13LeftClick.bind(this)($event, c)'
>
</gem-button>



  </ng-template>
  <ng-template #gemButton14Tpl>
    
    
<gem-button class='gemButton14'
      [width] = 'getGemButton14WidthForAngular__ChangeDetection(
        c)'
      [label] = 'getGemButton14LabelForAngular__ChangeDetection(
        c)'
      (leftClick) = 'gemButton14LeftClick.bind(this)($event, c)'
>
</gem-button>



  </ng-template>
  <ng-template #gemColumn11Tpl>
    
    
<gem-column class='gemColumn11'
      [width] = 'getGemColumn11WidthForAngular__ChangeDetection(
        c)'
      [rowGap] = 'getGemColumn11RowGapForAngular__ChangeDetection(
        c)'
      [hAlign] = 'getGemColumn11HAlignForAngular__ChangeDetection(
        c)'
      [components] = '[gemText12Tpl, gemButton13Tpl, gemButton14Tpl, ]'
>
</gem-column>



  </ng-template>
  <ng-template #gemRow4Tpl>
    
    
<gem-row class='gemRow4'
      [colGap] = 'getGemRow4ColGapForAngular__ChangeDetection(
        c)'
      [vAlign] = 'getGemRow4VAlignForAngular__ChangeDetection(
        c)'
      [hAlign] = 'getGemRow4HAlignForAngular__ChangeDetection(
        c)'
      [components] = '[gemImage5Tpl, gemGrid6Tpl, gemColumn11Tpl, ]'
>
</gem-row>



  </ng-template>

</ng-container>



  </ng-template>
  <ng-template #gemColumn1Tpl>
    
    
<gem-column class='gemColumn1'
      [rowGap] = 'getGemColumn1RowGapForAngular__ChangeDetection(
        )'
      [width] = 'getGemColumn1WidthForAngular__ChangeDetection(
        )'
      [hAlign] = 'getGemColumn1HAlignForAngular__ChangeDetection(
        )'
      [components] = '[gemText2Tpl, it3Tpl, ]'
>
</gem-column>



  </ng-template>
