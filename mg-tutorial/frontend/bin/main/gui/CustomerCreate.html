
  
  
    
<gem-card class='gemCard0'
      [title] = 'getGemCard0TitleForAngular__ChangeDetection(
        )'
      [component] = 'gemColumn1Tpl'
>
</gem-card>



  <ng-template #nameTpl>
    
    
<gem-text-input class='name'
      [labelText] = 'getNameLabelTextForAngular__ChangeDetection(
        )'
      [entry] = 'getNameEntryForAngular__ChangeDetection(
        )'
        (entryChange) = 'setNameEntry(
          $event)'
    [validity] = 'getNameValidityForAngular__ChangeDetection(
      )'
>
</gem-text-input>



  </ng-template>
  <ng-template #emailTpl>
    
    
<gem-text-input class='email'
      [labelText] = 'getEmailLabelTextForAngular__ChangeDetection(
        )'
      [entry] = 'getEmailEntryForAngular__ChangeDetection(
        )'
        (entryChange) = 'setEmailEntry(
          $event)'
    [validity] = 'getEmailValidityForAngular__ChangeDetection(
      )'
>
</gem-text-input>



  </ng-template>
  <ng-template #ageTpl>
    
    
<gem-text-input class='age'
      [labelText] = 'getAgeLabelTextForAngular__ChangeDetection(
        )'
      [entry] = 'getAgeEntryForAngular__ChangeDetection(
        )'
        (entryChange) = 'setAgeEntry(
          $event)'
    [validity] = 'getAgeValidityForAngular__ChangeDetection(
      )'
>
</gem-text-input>



  </ng-template>
  <ng-template #registerTpl>
    
    
<gem-button class='register'
      [label] = 'getRegisterLabelForAngular__ChangeDetection(
        )'
      (leftClick) = 'registerLeftClick.bind(this)($event)'
>
</gem-button>



  </ng-template>
  <ng-template #gemColumn1Tpl>
    
    
<gem-column class='gemColumn1'
      [width] = 'getGemColumn1WidthForAngular__ChangeDetection(
        )'
      [rowGap] = 'getGemColumn1RowGapForAngular__ChangeDetection(
        )'
      [components] = '[nameTpl, emailTpl, ageTpl, registerTpl, ]'
>
</gem-column>



  </ng-template>
